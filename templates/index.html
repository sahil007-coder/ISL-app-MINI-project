<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignSync Pro | ISL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand"><div class="logo-hex"><i class="fa-solid fa-hands"></i></div><span>SignSync <strong>PRO</strong></span></div>
            <div class="session-info">
                <div class="stat-mini"><span class="label">Session</span><span class="value" id="session-timer">00:00:00</span></div>
                <div class="stat-mini"><span class="label">Engine FPS</span><span class="value" id="fps-val">0</span></div>
            </div>
            <button id="camera-toggle-btn" class="main-cta start-mode"><i class="fa-solid fa-power-off"></i> <span id="toggle-btn-text">Start Engine</span></button>
        </aside>
        <main class="main-content">
            <div class="dashboard-grid">
                <div class="video-container glass-panel">
                    <div class="panel-header"><span class="live-indicator" id="live-indicator" style="display: none;"><span class="dot"></span> LIVE</span> Visual Input</div>
                    <div class="stream-box">
                        <img src="" id="video-stream" style="display: none;">
                        <div class="camera-placeholder" id="camera-offline"><i class="fa-solid fa-video-slash"></i><h3>System Standby</h3></div>
                    </div>
                </div>
                <div class="controls-container">
                    <div class="stat-card primary-stat glass-panel"><span class="stat-label">Detected Sign</span><div class="stat-value" id="current-sign">---</div></div>
                    <div class="stat-card glass-panel"><div class="stat-header"><span class="stat-label">Confidence</span><span id="confidence-text">0%</span></div><div class="progress-track"><div class="progress-fill" id="confidence-fill"></div></div></div>
                    <div class="history-container glass-panel">
                        <div class="history-header"><span class="stat-label">History</span>
                            <div class="history-actions">
                                <button id="btn-edit" class="icon-btn"><i class="fa-solid fa-lock"></i></button>
                                <button id="btn-copy" class="icon-btn"><i class="fa-solid fa-copy"></i></button>
                                <button id="btn-clear" class="icon-btn danger"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                        <textarea id="sentence-history" readonly placeholder="Output logs..."></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
